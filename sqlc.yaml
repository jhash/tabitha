version: "2"
sql:
  - schema:
      - migrations/0001_users.up.sql
      - migrations/0002_songs.up.sql
      - migrations/0003_transcription_versions.up.sql
      - migrations/0004_sessions.up.sql
      - migrations/0005_google_oauth_tokens.up.sql
      - migrations/0006_artists_genres.up.sql
      - migrations/0007_status_default_preferred_key.up.sql
      - migrations/0008_doc_timestamps.up.sql
    queries: internal/db/queries
    engine: postgresql
    gen:
      go:
        package: "db"
        out: internal/db
        sql_package: pgx/v5
        emit_json_tags: true
        emit_pointers_for_null_types: true
